name: macOS 便携版 zip

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mac-portable:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建应用与 macOS zip
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # 禁止 electron-builder 在 CI 内向 GitHub Release 发布（仅需 Actions Artifact）
          ELECTRON_BUILDER_PUBLISH: never
        run: npm run build:mac

      - name: 上传 Apple Silicon（arm64）zip
        uses: actions/upload-artifact@v4
        with:
          name: wenben-mac-arm64
          path: dist_102_v2/wenben-mac-portable-*-arm64.zip
          if-no-files-found: error

      - name: 上传 Intel（x64）zip
        uses: actions/upload-artifact@v4
        with:
          name: wenben-mac-x64
          path: dist_102_v2/wenben-mac-portable-*-x64.zip
          if-no-files-found: error
